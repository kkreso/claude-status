name: Xcode Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-plugin:
    name: Build Plugin
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            claude-status-plugin/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('claude-status-plugin/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build plugin binaries
        run: |
          cd claude-status-plugin
          cargo build --release
          mkdir -p plugins/claude-status/scripts
          cp target/release/session-status plugins/claude-status/scripts/
          cp target/release/set-session-name plugins/claude-status/scripts/
          codesign -fs - plugins/claude-status/scripts/session-status
          codesign -fs - plugins/claude-status/scripts/set-session-name

      - name: Archive plugin binaries
        run: |
          tar -C claude-status-plugin/plugins/claude-status -czf plugin-binaries.tgz scripts

      - name: Upload plugin binaries
        uses: actions/upload-artifact@v4
        with:
          name: plugin-binaries
          path: plugin-binaries.tgz
          retention-days: 1

  build:
    name: Build
    needs: build-plugin
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download plugin binaries
        uses: actions/download-artifact@v4
        with:
          name: plugin-binaries
          path: .

      - name: Extract plugin binaries
        run: |
          mkdir -p claude-status-plugin/plugins/claude-status
          tar -xzf plugin-binaries.tgz -C claude-status-plugin/plugins/claude-status

      - name: Build
        run: |
          xcodebuild clean build \
            -project "Claude Status.xcodeproj" \
            -scheme "Claude Status" \
            -destination "platform=macOS" \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            ROLLBAR_ACCESS_TOKEN="${{ secrets.ROLLBAR_ACCESS_TOKEN }}"

  test:
    name: Test
    needs: build-plugin
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download plugin binaries
        uses: actions/download-artifact@v4
        with:
          name: plugin-binaries
          path: .

      - name: Extract plugin binaries
        run: |
          mkdir -p claude-status-plugin/plugins/claude-status
          tar -xzf plugin-binaries.tgz -C claude-status-plugin/plugins/claude-status

      - name: Test
        run: |
          xcodebuild test \
            -project "Claude Status.xcodeproj" \
            -scheme "Claude Status" \
            -destination "platform=macOS" \
            -only-testing:"Claude StatusTests" \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            ROLLBAR_ACCESS_TOKEN="${{ secrets.ROLLBAR_ACCESS_TOKEN }}"
