name: Xcode Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild clean build \
            -project "Claude Status.xcodeproj" \
            -scheme "Claude Status" \
            -destination "platform=macOS" \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO

  test:
    name: Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: |
          xcodebuild test \
            -project "Claude Status.xcodeproj" \
            -scheme "Claude Status" \
            -destination "platform=macOS" \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO
