name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build & Notarize
    runs-on: macos-latest
    outputs:
      zip_name: ${{ steps.package.outputs.zip_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign \
            -T /usr/bin/pkgbuild
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm "$RUNNER_TEMP/cert.p12"

      - name: Install provisioning profiles
        env:
          PROVISIONING_PROFILE_APP: ${{ secrets.PROVISIONING_PROFILE_APP }}
          PROVISIONING_PROFILE_WIDGET: ${{ secrets.PROVISIONING_PROFILE_WIDGET }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISIONING_PROFILE_APP" | base64 --decode \
            -o "$HOME/Library/MobileDevice/Provisioning Profiles/app.provisionprofile"
          echo "$PROVISIONING_PROFILE_WIDGET" | base64 --decode \
            -o "$HOME/Library/MobileDevice/Provisioning Profiles/widget.provisionprofile"

      - name: Resolve Sparkle packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "Claude Status.xcodeproj" \
            -scheme "Claude Status"

      - name: Extract provisioning profile names
        id: profiles
        run: |
          APP_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< \
            "$(/usr/bin/security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/app.provisionprofile")")
          WIDGET_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< \
            "$(/usr/bin/security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/widget.provisionprofile")")
          echo "app_name=$APP_PROFILE_NAME" >> "$GITHUB_OUTPUT"
          echo "widget_name=$WIDGET_PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Set provisioning profiles in project
        env:
          APP_PROFILE_NAME: ${{ steps.profiles.outputs.app_name }}
          WIDGET_PROFILE_NAME: ${{ steps.profiles.outputs.widget_name }}
        run: |
          ruby -e '
            pbxproj = File.read("Claude Status.xcodeproj/project.pbxproj")
            app_profile = ENV["APP_PROFILE_NAME"]
            widget_profile = ENV["WIDGET_PROFILE_NAME"]
            # Insert PROVISIONING_PROFILE_SPECIFIER after each PRODUCT_BUNDLE_IDENTIFIER line
            pbxproj.gsub!(
              /^(\s*PRODUCT_BUNDLE_IDENTIFIER = "com\.poisonpenllc\.Claude-Status";)$/,
              "\\1\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"#{app_profile}\";"
            )
            pbxproj.gsub!(
              /^(\s*PRODUCT_BUNDLE_IDENTIFIER = "com\.poisonpenllc\.Claude-Status\.widget";)$/,
              "\\1\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"#{widget_profile}\";"
            )
            File.write("Claude Status.xcodeproj/project.pbxproj", pbxproj)
          '

      - name: Build archive
        run: |
          xcodebuild clean archive \
            -project "Claude Status.xcodeproj" \
            -scheme "Claude Status" \
            -configuration Release \
            -archivePath DerivedData/Claude-Status.xcarchive \
            -destination "platform=macOS" \
            -skipPackageSignatureValidation \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES \
            SPARKLE_ED_KEY="${{ secrets.SPARKLE_ED_PUBLIC_KEY }}" \
            ROLLBAR_ACCESS_TOKEN="${{ secrets.ROLLBAR_ACCESS_TOKEN }}" \
            MARKETING_VERSION="${{ github.event.release.tag_name }}" \
            MACOSX_DEPLOYMENT_TARGET=15.0

      - name: Create export options
        env:
          TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM }}
          APP_PROFILE: ${{ steps.profiles.outputs.app_name }}
          WIDGET_PROFILE: ${{ steps.profiles.outputs.widget_name }}
        run: |
          /usr/libexec/PlistBuddy -c "Clear dict" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string developer-id" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string Developer ID Application" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.poisonpenllc.Claude-Status string $APP_PROFILE" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.poisonpenllc.Claude-Status.widget string $WIDGET_PROFILE" ExportOptions.plist

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath DerivedData/Claude-Status.xcarchive \
            -exportPath DerivedData/Export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          APP_PATH="DerivedData/Export/Claude Status.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" notarize.zip
          SUBMIT_OUT=$(xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1) || true
          echo "$SUBMIT_OUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | grep "id:" | head -1 | awk '{print $2}')
          STATUS=$(echo "$SUBMIT_OUT" | grep "status:" | tail -1 | awk '{print $2}')
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              developer_log.json 2>&1 || true
            cat developer_log.json 2>/dev/null || true
            exit 1
          fi
          xcrun stapler staple "$APP_PATH"
          rm notarize.zip

      - name: Package app
        id: package
        run: |
          APP_PATH="DerivedData/Export/Claude Status.app"
          ZIP_NAME="Claude-Status-${{ github.event.release.tag_name }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Build installer pkg
        id: pkg
        run: |
          APP_PATH="DerivedData/Export/Claude Status.app"
          PKG_NAME="Claude-Status-${{ github.event.release.tag_name }}.pkg"
          pkgbuild \
            --component "$APP_PATH" \
            --install-location "/Applications" \
            --identifier "com.poisonpenllc.Claude-Status" \
            --version "${{ github.event.release.tag_name }}" \
            --sign "${{ secrets.INSTALLER_SIGN_IDENTITY }}" \
            "$PKG_NAME"
          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Notarize pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcrun notarytool submit "${{ steps.pkg.outputs.pkg_name }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ steps.pkg.outputs.pkg_name }}"

      - name: Upload dSYMs to Rollbar
        if: "${{ env.ROLLBAR_DSYM_TOKEN != '' }}"
        env:
          ROLLBAR_DSYM_TOKEN: ${{ secrets.ROLLBAR_DSYM_TOKEN }}
        run: |
          DSYM_PATH="DerivedData/Claude-Status.xcarchive/dSYMs/Claude Status.app.dSYM"
          if [ -d "$DSYM_PATH" ]; then
            zip -r dsyms.zip "$DSYM_PATH"
            curl -X POST https://api.rollbar.com/api/1/dsym \
              -F "dsym=@dsyms.zip" \
              -H "X-Rollbar-Access-Token: $ROLLBAR_DSYM_TOKEN"
            rm dsyms.zip
          fi

      - name: Notify Rollbar of deploy
        if: "${{ env.ROLLBAR_DSYM_TOKEN != '' }}"
        env:
          ROLLBAR_DSYM_TOKEN: ${{ secrets.ROLLBAR_DSYM_TOKEN }}
        run: |
          curl -X POST https://api.rollbar.com/api/1/deploy \
            -H "X-Rollbar-Access-Token: $ROLLBAR_DSYM_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"environment\": \"production\", \"revision\": \"${{ github.sha }}\", \"local_username\": \"github-actions\", \"rollbar_username\": \"github-actions\", \"comment\": \"Release ${{ github.event.release.tag_name }}\"}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.package.outputs.zip_name }}" \
            "${{ steps.pkg.outputs.pkg_name }}"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-zip
          path: ${{ steps.package.outputs.zip_name }}

  appcast:
    name: Update Appcast
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: app-zip

      - name: Download Sparkle
        run: |
          SPARKLE_VERSION="2.7.0"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o sparkle.tar.xz
          mkdir sparkle
          tar -xf sparkle.tar.xz -C sparkle

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p releases
          mv "${{ needs.build.outputs.zip_name }}" releases/

          TAG="${{ github.event.release.tag_name }}"

          echo "$SPARKLE_PRIVATE_KEY" | ./sparkle/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/gmr/claude-status/releases/download/${TAG}/" \
            releases/

          # Move generated appcast to root for GitHub Pages
          if [ -f releases/appcast.xml ]; then
            cp releases/appcast.xml appcast.xml
          fi

      - name: Commit and push appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet || git commit -m "Update appcast for ${{ github.event.release.tag_name }}"
          git push
